<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f6cbd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Staff Timesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Staff Timesheet</title>
<style>
  :root{
    --brand:#0f6cbd;--brand-dark:#0a4f8a;--bg:#eef1f5;--card:#ffffff;--ink:#1f2329;--muted:#6a7280;--line:#e3e7ec;
    --amber:#b86e00;--green:#0f7b3f;--red:#b3261e;
  }
  *{box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100%;position:relative;}
  .appbar{background:var(--brand);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 16px 14px;display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  .appbar .ttl{font-size:16px;font-weight:600;flex:1;}
  .appbar .user{font-size:11px;background:rgba(255,255,255,.22);padding:4px 9px;border-radius:20px;cursor:pointer;}
  .body{flex:1;overflow-y:auto;padding:14px;max-width:560px;width:100%;margin:0 auto;}
  .body::-webkit-scrollbar{width:0;}
  .sh{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin:2px 2px 4px;}
  .meta{color:var(--muted);font-size:12px;line-height:1.5;}
  .weekhead{margin:2px 2px 12px;}
  .weekhead .rng{font-size:15px;font-weight:600;color:var(--ink);}
  .weekhead .close{font-size:12px;color:var(--amber);margin-top:2px;}
  label{display:block;font-size:12.5px;font-weight:600;color:#3b424b;margin:0 0 5px;}
  input,select{width:100%;padding:11px;border:1px solid #cdd3da;border-radius:8px;font-size:16px;background:#fff;color:var(--ink);}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,108,189,.15);}
  .row2{display:flex;gap:8px;} .row2 .gwo{flex:1;} .row2 .ghr{width:84px;}
  .day{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:11px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .day .dayhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .day .dayname{font-weight:600;font-size:14px;}
  .day .daytot{font-weight:700;font-size:14px;color:var(--brand-dark);}
  .line{background:#fbfcfe;border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;position:relative;}
  .line .num{font-size:11px;font-weight:700;color:var(--brand);}
  .line .del{position:absolute;right:8px;top:7px;cursor:pointer;color:#b3b9c0;font-size:18px;padding:2px 6px;}
  .combo{position:relative;}
  .sugg{position:absolute;left:0;right:0;top:calc(100% + 3px);background:#fff;border:1px solid #cdd3da;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,.12);z-index:5;overflow:hidden;max-height:200px;overflow-y:auto;}
  .sugg div{padding:10px 11px;font-size:14px;cursor:pointer;border-bottom:1px solid #f0f2f5;}
  .sugg div:last-child{border-bottom:none;}
  .sugg .new{color:var(--brand);font-weight:600;}
  .addline{width:100%;padding:9px;background:#eef5fc;color:var(--brand);border:1.5px dashed var(--brand);border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:2px;}
  .totbar{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 4px;font-size:15px;padding-top:8px;border-top:2px solid var(--line);}
  .totbar b{font-size:20px;color:var(--brand-dark);}
  .btn{width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;}
  .btn:disabled{opacity:.6;}
  .loading{text-align:center;color:var(--muted);font-size:14px;padding:30px 0;}
  .hp{position:absolute;left:-9999px;}
  .signin{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 18px 22px;box-shadow:0 1px 2px rgba(16,24,40,.04);text-align:center;margin-top:30px;}
  .signin .logo{width:64px;height:64px;border-radius:16px;margin:2px auto 14px;display:block;}
  .signin h2{font-size:18px;font-weight:600;margin:0 0 6px;}
  .signin .ms{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;margin-top:18px;background:#fff;border:1px solid #cdd3da;border-radius:8px;font-size:15px;font-weight:600;color:#1f2329;cursor:pointer;}
  .signin .ms:hover{background:#f4f7fb;}
  .signin .ms .g{display:inline-grid;grid-template-columns:1fr 1fr;gap:2px;width:18px;height:18px;}
  .signin .ms .g i{display:block;width:8px;height:8px;}
  .signin .err{color:var(--red);font-size:13px;min-height:18px;margin-top:12px;}
  .signin .foot{font-size:11px;color:var(--muted);margin-top:14px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 28px);background:#1f2329;color:#fff;padding:11px 18px;border-radius:24px;font-size:13.5px;opacity:0;transition:opacity .25s;pointer-events:none;text-align:center;max-width:320px;z-index:30;}
  .toast.show{opacity:.96;}
  .verbadge{position:fixed;left:calc(env(safe-area-inset-left) + 14px);bottom:calc(env(safe-area-inset-bottom) + 14px);z-index:40;background:rgba(31,35,41,.62);color:#fff;font-size:10px;line-height:1;padding:4px 7px;border-radius:10px;letter-spacing:.3px;pointer-events:none;}
  .allow{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line);}
  .allow-h{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
  .achk{display:flex;align-items:center;gap:9px;font-size:14px;padding:6px 0;color:var(--ink);cursor:pointer;}
  .achk input{width:18px;height:18px;flex:0 0 auto;margin:0;}
  .hidden{display:none !important;}
</style>
</head>
<body>
  <div class="appbar">
    <span class="ttl">Staff Timesheet</span>
    <span class="user hidden" id="who" onclick="signOut()">Sign out</span>
  </div>

  <!-- ===== SIGN IN ===== -->
  <div class="body" id="gateBody">
    <div class="signin">
      <img class="logo" src="icons/icon-192.png" alt="">
      <h2>Staff timesheet</h2>
      <div class="meta">Sign in with your work account to log your hours.</div>
      <button class="ms" id="msBtn" onclick="signIn()">
        <span class="g"><i style="background:#f25022"></i><i style="background:#7fba00"></i><i style="background:#00a4ef"></i><i style="background:#ffb900"></i></span>
        Sign in with Microsoft
      </button>
      <div class="err" id="signErr"></div>
      <div class="foot" id="signinVer" style="opacity:.55;margin-top:14px"></div>
    </div>
  </div>

  <!-- ===== WEEKLY TIMESHEET ===== -->
  <div class="body hidden" id="weekView">
    <div class="weekhead" id="weekHead"></div>
    <div id="days"><div class="loading">Loading your week…</div></div>
    <div class="totbar"><span>Week total</span><b id="weekTotal">0.0 h</b></div>
    <input class="hp" tabindex="-1" autocomplete="off" id="company">
    <button type="button" class="btn" id="submit" onclick="submitWeek()">Submit week</button>
    <div class="foot" id="closeFoot" style="text-align:center;color:var(--muted);font-size:11px;margin-top:12px">You can change this week's hours until it closes.</div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="verbadge" id="verbadge"></div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
<script src="config.js"></script>
<script>
const WORKORDERS = [
  "WO-10241 — Riverside fitout","WO-10238 — Northgate roof","WO-10255 — Depot electrical",
  "WO-10199 — Harbour maintenance","WO-10260 — Riverside snagging"
];
let msalInstance=null, account=null, WEEK=null, SITES=[], ALLOWANCES_BY_SITE={}, WEEKLY_OPTIONS=[], WEEK_ALLOWANCES=[], userName='there', userEmail='';
const SCOPES=['openid','profile','email'];

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function esc(s){return String(s).replace(/"/g,'&quot;');}
function firstName(n){return (n||'').trim().split(/\s+/)[0]||'there';}
function dayLabel(date){return new Date(date+'T00:00:00Z').toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short',timeZone:'UTC'});}

/* ---------- Microsoft sign-in ---------- */
(async function init(){
  const cfg=window.STAFF_CONFIG||{};
  if(!cfg.clientId || cfg.clientId.indexOf('PASTE')===0){ document.getElementById('signErr').textContent='Sign-in not configured yet (clientId missing in config.js).'; return; }
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{ clientId:cfg.clientId, authority:'https://login.microsoftonline.com/'+cfg.tenantId, redirectUri:window.location.origin },
      cache:{ cacheLocation:'localStorage' }
    });
    await msalInstance.initialize();
    const resp=await msalInstance.handleRedirectPromise();
    account=(resp && resp.account) || msalInstance.getAllAccounts()[0] || null;
    if(account){ msalInstance.setActiveAccount(account); afterSignIn(); }
  }catch(e){ document.getElementById('signErr').textContent='Sign-in error — try again.'; }
})();

async function signIn(){
  if(!msalInstance){ return; }
  try{ await msalInstance.loginRedirect({ scopes:SCOPES }); }
  catch(e){ document.getElementById('signErr').textContent='Couldn’t start sign-in.'; }
}
function signOut(){ if(msalInstance && account){ msalInstance.logoutRedirect({ account }); } }

async function getToken(){
  const res=await msalInstance.acquireTokenSilent({ account, scopes:SCOPES });
  return res.idToken;
}
async function api(path, body){
  const token=await getToken();
  return fetch(path,{ method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: body?JSON.stringify(body):'{}' });
}

function afterSignIn(){
  userName=(account && (account.name || (account.idTokenClaims && account.idTokenClaims.name))) || 'there';
  userEmail=(account && (account.username || (account.idTokenClaims && account.idTokenClaims.preferred_username))) || '';
  document.getElementById('gateBody').classList.add('hidden');
  document.getElementById('weekView').classList.remove('hidden');
  const chip=document.getElementById('who'); chip.classList.remove('hidden'); chip.textContent=firstName(userName)+' · Sign out';
  loadWeek();
}

/* ---------- weekly timesheet ---------- */
async function loadWeek(){
  document.getElementById('days').innerHTML='<div class="loading">Loading your week…</div>';
  try{
    const res=await api('/.netlify/functions/week',{});
    if(res.status===401){ toast('Please sign in again'); return; }
    const data=await res.json();
    if(!data.ok) throw new Error('load');
    SITES=data.sites||[];
    ALLOWANCES_BY_SITE=data.allowancesBySite||{};
    WEEKLY_OPTIONS=data.weeklyOptions||[];
    WEEK_ALLOWANCES=(data.weekAllowances||[]).slice();
    WEEK={ weekStart:data.weekStart, weekEnd:data.weekEnd, closeDayName:data.closeDayName, homeSite:data.homeSite||'',
      days:(data.days||[]).map(d=>({ date:d.date, site:d.site||data.homeSite||'',
        lines:(d.lines||[]).map(l=>({wo:String(l.wo||''),hr:(l.hr!=null?String(l.hr):'')})),
        allowances:(d.allowances||[]).slice() })) };
    renderWeek();
  }catch(e){ document.getElementById('days').innerHTML='<div class="loading">Couldn’t load your week — check signal.</div>'; }
}
function siteOptions(sel){ let h=`<option value="" ${sel?'':'selected'} disabled>Choose site…</option>`; for(const s of SITES) h+=`<option ${s===sel?'selected':''}>${esc(s)}</option>`; return h; }
function lineHtml(di,li,l){
  return `<div class="line"><span class="num">Line ${li+1}</span><span class="del" onclick="delLine(${di},${li})">✕</span>
    <div class="row2" style="margin-top:6px">
      <div class="gwo combo">
        <input inputmode="text" placeholder="Work order…" value="${esc(l.wo)}"
          oninput="WEEK.days[${di}].lines[${li}].wo=this.value;suggest(${di},${li},this.value)"
          onfocus="suggest(${di},${li},this.value)" onblur="hideSugg(${di},${li})">
        <div class="sugg" id="sg${di}_${li}" style="display:none"></div>
      </div>
      <input class="ghr" type="number" step="0.25" min="0" inputmode="decimal" placeholder="hrs" value="${esc(l.hr)}"
        oninput="WEEK.days[${di}].lines[${li}].hr=this.value;dayTot(${di});calcWeekTotal()">
    </div></div>`;
}
function renderWeek(){
  document.getElementById('weekHead').innerHTML=
    `<div class="sh">Hi ${esc(firstName(userName))} — your timesheet</div>
     <div class="rng">${dayLabel(WEEK.weekStart)} – ${dayLabel(WEEK.weekEnd)}</div>
     <div class="diag" style="font-size:11px;color:#8a8f98;margin-top:2px">${esc(userEmail||'?')} · home site: ${WEEK.homeSite?esc(WEEK.homeSite):'— not found in Workers list'}</div>
     <div class="close">Open until ${esc(WEEK.closeDayName)} — re-enter any time to change it.</div>`;
  document.getElementById('days').innerHTML=weekAllowHtml()+WEEK.days.map((d,di)=>{
    const tot=d.lines.reduce((s,l)=>s+(parseFloat(l.hr)||0),0).toFixed(1);
    return `<div class="day">
      <div class="dayhd"><span class="dayname">${dayLabel(d.date)}</span><span class="daytot" id="dt${di}">${tot}h</span></div>
      <label>Site</label>
      <select onchange="setDaySite(${di},this.value)">${siteOptions(d.site)}</select>
      <div id="dl${di}">${d.lines.map((l,li)=>lineHtml(di,li,l)).join('')}</div>
      <button type="button" class="addline" onclick="addLine(${di})">+ add work order</button>
      ${allowHtml(di,d)}
    </div>`;
  }).join('');
  const cf=document.getElementById('closeFoot'); if(cf) cf.textContent=`This week closes ${WEEK.closeDayName} — change your hours any time until then.`;
  calcWeekTotal();
}
function setDaySite(di,site){ WEEK.days[di].site=site; const ok=(ALLOWANCES_BY_SITE[site]||{}).daily||[]; WEEK.days[di].allowances=(WEEK.days[di].allowances||[]).filter(a=>ok.includes(a)); renderWeek(); }
function allowHtml(di,d){
  const opts=(ALLOWANCES_BY_SITE[d.site]||{}).daily||[];
  if(!d.site || !opts.length) return '';
  const chks=opts.map(a=>`<label class="achk"><input type="checkbox" ${d.allowances.includes(a)?'checked':''} onchange="toggleAllow(${di},'${a.replace(/'/g,"\\'")}',this.checked)"> ${esc(a)}</label>`).join('');
  return `<div class="allow"><div class="allow-h">Allowances</div>${chks}</div>`;
}
function toggleAllow(di,name,on){ const arr=WEEK.days[di].allowances; const i=arr.indexOf(name); if(on&&i<0)arr.push(name); else if(!on&&i>=0)arr.splice(i,1); }
function weekAllowHtml(){
  if(!WEEKLY_OPTIONS.length) return '';
  const chks=WEEKLY_OPTIONS.map(a=>`<label class="achk"><input type="checkbox" ${WEEK_ALLOWANCES.includes(a)?'checked':''} onchange="toggleWeekAllow('${a.replace(/'/g,"\\'")}',this.checked)"> ${esc(a)}</label>`).join('');
  return `<div class="day"><div class="allow-h" style="margin-bottom:6px">Weekly allowances</div>${chks}</div>`;
}
function toggleWeekAllow(name,on){ const i=WEEK_ALLOWANCES.indexOf(name); if(on&&i<0)WEEK_ALLOWANCES.push(name); else if(!on&&i>=0)WEEK_ALLOWANCES.splice(i,1); }
function addLine(di){ WEEK.days[di].lines.push({wo:'',hr:''}); renderWeek(); }
function delLine(di,li){ WEEK.days[di].lines.splice(li,1); renderWeek(); }
function dayTot(di){ const el=document.getElementById('dt'+di); if(el) el.textContent=WEEK.days[di].lines.reduce((s,l)=>s+(parseFloat(l.hr)||0),0).toFixed(1)+'h'; }
function calcWeekTotal(){ let t=0; for(const d of WEEK.days) for(const l of d.lines) t+=parseFloat(l.hr)||0; document.getElementById('weekTotal').textContent=t.toFixed(1)+' h'; }
function suggest(di,li,v){
  const box=document.getElementById('sg'+di+'_'+li); if(!box)return; v=(v||'').trim();
  let m=WORKORDERS.filter(w=>w.toLowerCase().includes(v.toLowerCase()));
  let html=m.map(w=>`<div onmousedown="pick(${di},${li},'${w.replace(/'/g,"\\'")}')">${w}</div>`).join('');
  if(v && !WORKORDERS.some(w=>w.toLowerCase()===v.toLowerCase())) html+=`<div class="new" onmousedown="pick(${di},${li},'${v.replace(/'/g,"\\'")}')">+ Use: “${v}”</div>`;
  box.innerHTML=html; box.style.display=html?'block':'none';
}
function hideSugg(di,li){ setTimeout(()=>{const b=document.getElementById('sg'+di+'_'+li); if(b)b.style.display='none';},150); }
function pick(di,li,wo){ WEEK.days[di].lines[li].wo=wo; renderWeek(); }

async function submitWeek(){
  const days=WEEK.days.map(d=>({ date:d.date, site:d.site,
    lines:d.lines.filter(l=>l.wo.trim()&&parseFloat(l.hr)>0).map(l=>({wo:l.wo.trim(),hr:parseFloat(l.hr)})),
    allowances:(d.allowances||[]) }))
    .filter(d=>d.site && (d.lines.length || d.allowances.length));
  const btn=document.getElementById('submit'); btn.disabled=true; btn.textContent='Submitting…';
  try{
    const res=await api('/.netlify/functions/submitweek',{days,weekAllowances:WEEK_ALLOWANCES});
    if(res.status===401){ toast('Please sign in again'); return; }
    const data=await res.json();
    if(!data.ok) throw new Error('save');
    toast(`Week saved — ${data.created} entr${data.created===1?'y':'ies'}`);
    await loadWeek();
  }catch(e){ toast('Couldn’t save — check signal and try again'); }
  finally{ btn.disabled=false; btn.textContent='Submit week'; }
}

/* Version badge (shown on every screen) + always-check-for-updates on load */
const APP_VERSION='8';
document.getElementById('verbadge').textContent='v'+APP_VERSION;
document.getElementById('signinVer').textContent='Version '+APP_VERSION;
if('serviceWorker' in navigator && location.hostname!=='localhost' && location.hostname!=='127.0.0.1'){
  navigator.serviceWorker.register('sw.js').then(reg=>{ try{ reg.update(); }catch(e){} }).catch(()=>{});
}
</script>
</body>
</html>
